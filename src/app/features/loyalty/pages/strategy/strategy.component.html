<div class="bg-gray-50 min-h-screen p-6">

  <!-- Header -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 mb-6">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center">
          <i class="pi pi-sitemap text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Loyalty Strategy</h1>
          <p class="text-gray-500 text-sm">Program structure, tier rules and earning policies</p>
        </div>
      </div>
      <p-button label="Edit Strategy" icon="pi pi-pencil" severity="primary"></p-button>
    </div>
  </div>

  <!-- Policies -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
    <div *ngFor="let p of policies" class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" [class]="p.bg">
        <i [class]="p.icon + ' ' + p.color"></i>
      </div>
      <div class="min-w-0">
        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide">{{ p.label }}</p>
        <p class="text-sm font-semibold text-gray-900 mt-0.5 leading-snug">{{ p.value }}</p>
      </div>
    </div>
  </div>

  <!-- Tiers -->
  <h2 class="text-lg font-bold text-gray-900 mb-4">Tier Structure</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
    <div *ngFor="let t of tiers; let i = index"
      class="bg-white rounded-xl border shadow-sm overflow-hidden"
      [style.border-color]="t.border">
      <!-- Top accent -->
      <div class="h-1.5" [style.background]="t.color"></div>
      <div class="p-5">
        <div class="flex items-center justify-between mb-3">
          <div class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold border"
            [style.background]="t.bg" [style.color]="t.color" [style.border-color]="t.border">
            {{ t.tier }}
          </div>
          <span class="text-xs font-bold text-gray-400">× {{ t.multiplier }}</span>
        </div>

        <div class="text-xs text-gray-500 mb-4">
          <span class="font-semibold text-gray-700">{{ t.minPoints | number }}</span>
          <span *ngIf="t.maxPoints"> – <span class="font-semibold text-gray-700">{{ t.maxPoints | number }}</span></span>
          <span *ngIf="!t.maxPoints"> +</span>
          <span class="ml-1">points</span>
        </div>

        <div class="space-y-1.5">
          <div *ngFor="let perk of t.perks" class="flex items-start gap-2 text-sm">
            <i class="pi pi-check text-xs mt-0.5 flex-shrink-0" [style.color]="t.color"></i>
            <span class="text-gray-600">{{ perk }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
