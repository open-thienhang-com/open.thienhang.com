<div class="bg-gray-50 min-h-screen p-6">

  <!-- Header -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-pink-600 rounded-xl flex items-center justify-center">
          <i class="pi pi-heart text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Loyalty & CRM</h1>
          <p class="text-gray-500 text-sm">Customer relationships, rewards, campaigns and strategy</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <p-button icon="pi pi-refresh" severity="secondary" [outlined]="true" [rounded]="true" pTooltip="Refresh" class="hidden sm:inline-flex"></p-button>
        <p-button label="New Campaign" icon="pi pi-plus" severity="primary" routerLink="/loyalty/campaigns"></p-button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
    <div *ngFor="let s of stats" class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-gray-500">{{ s.label }}</p>
          <p class="text-2xl font-bold text-gray-900 mt-1">{{ s.value }}</p>
          <p class="text-xs text-gray-400 mt-0.5">{{ s.sub }}</p>
        </div>
        <div class="w-11 h-11 rounded-xl flex items-center justify-center" [class]="s.bg">
          <i [class]="s.icon + ' text-xl ' + s.color"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">

    <!-- Tier distribution -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-base font-semibold text-gray-900 mb-4">Tier Distribution</h2>
      <div class="space-y-3">
        <div *ngFor="let t of tiers">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-semibold" [style.color]="t.color">{{ t.label }}</span>
            <span class="text-sm text-gray-500">{{ t.count | number }} ({{ t.pct }}%)</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-2">
            <div class="h-2 rounded-full transition-all"
              [style.width.%]="t.pct"
              [style.background]="t.color"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick links -->
    <div class="lg:col-span-2 bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-base font-semibold text-gray-900 mb-4">Quick Access</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <a *ngFor="let link of quickLinks"
          [routerLink]="link.url"
          class="flex flex-col gap-2 p-4 rounded-xl border border-gray-100 hover:border-violet-200 hover:shadow-sm transition-all cursor-pointer no-underline group">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center" [class]="link.bg">
            <i [class]="link.icon + ' ' + link.color"></i>
          </div>
          <div>
            <div class="text-sm font-semibold text-gray-900 group-hover:text-violet-700 transition-colors">{{ link.label }}</div>
            <div class="text-xs text-gray-400 mt-0.5 leading-snug">{{ link.desc }}</div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- Recent activity -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <div class="px-6 py-4 border-b border-gray-100">
      <h2 class="text-base font-semibold text-gray-900">Recent Activity</h2>
    </div>
    <div class="divide-y divide-gray-50">
      <div *ngFor="let a of recentActivity" class="flex items-center gap-4 px-6 py-3">
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" [class]="a.bg">
          <i [class]="a.icon + ' text-sm ' + a.color"></i>
        </div>
        <div class="flex-1 min-w-0">
          <span class="text-sm font-medium text-gray-900">{{ a.event }}</span>
          <span class="text-sm text-gray-400 ml-1.5">— {{ a.member }}</span>
        </div>
        <span class="text-xs text-gray-400 flex-shrink-0">{{ a.time }}</span>
      </div>
    </div>
  </div>

</div>
