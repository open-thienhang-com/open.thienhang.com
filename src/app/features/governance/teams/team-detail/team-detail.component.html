<p-toast></p-toast>

<div class="p-4">
  <div class="flex align-items-center gap-3 mb-4">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="goBack()" pTooltip="Back to Teams"></p-button>
    <div *ngIf="team" class="flex align-items-center gap-3 flex-1">
      <h2 class="text-2xl font-bold text-900 m-0">{{ team.name }}</h2>
      <p-tag [value]="team.is_active !== false ? 'Active' : 'Inactive'" [severity]="getStatusSeverity(team.is_active)"></p-tag>
    </div>
    <p-progressSpinner *ngIf="loading" styleClass="w-2rem h-2rem"></p-progressSpinner>
  </div>

  <div *ngIf="!loading && team">
    <div class="grid">
      <!-- Details Card -->
      <div class="col-12 md:col-6">
        <p-card header="Team Details">
          <div class="flex justify-content-end mb-3">
            <p-button *ngIf="!editMode" label="Edit" icon="pi pi-pencil" severity="secondary" (onClick)="editMode=true"></p-button>
            <div *ngIf="editMode" class="flex gap-2">
              <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="cancelEdit()" [disabled]="saving"></p-button>
              <p-button label="Save" icon="pi pi-check" (onClick)="saveChanges()" [loading]="saving"></p-button>
            </div>
          </div>

          <div class="flex flex-column gap-3">
            <div class="flex flex-column gap-1">
              <label class="font-medium text-500 text-sm">Name</label>
              <input *ngIf="editMode" pInputText [(ngModel)]="editForm.name" class="w-full" />
              <span *ngIf="!editMode" class="text-900">{{ team.name }}</span>
            </div>
            <div class="flex flex-column gap-1">
              <label class="font-medium text-500 text-sm">Description</label>
              <input *ngIf="editMode" pInputText [(ngModel)]="editForm.description" class="w-full" />
              <span *ngIf="!editMode" class="text-900">{{ team.description || '—' }}</span>
            </div>
            <div class="flex flex-column gap-1">
              <label class="font-medium text-500 text-sm">Type</label>
              <span class="text-900">{{ team.type || '—' }}</span>
            </div>
            <div class="flex flex-column gap-1">
              <label class="font-medium text-500 text-sm">Owner</label>
              <span class="text-900">{{ team.owner || '—' }}</span>
            </div>
          </div>
        </p-card>
      </div>

      <!-- Members Card -->
      <div class="col-12 md:col-6">
        <p-card header="Members">
          <div *ngIf="getMemberList().length === 0" class="text-500 text-center py-3">No members</div>
          <div class="flex gap-2 flex-wrap">
            <p-chip *ngFor="let m of getMemberList()"
              [label]="m.name || m.email || m.kid || m" icon="pi pi-user">
            </p-chip>
          </div>
        </p-card>
      </div>
    </div>
  </div>
</div>
